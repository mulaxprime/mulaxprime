<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mulax Prime — Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Syne:wght@400;500;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #16161f;
    --accent: #e8ff47;
    --accent2: #47c8ff;
    --accent3: #ff6b47;
    --text: #f0f0f8;
    --muted: #7070a0;
    --border: rgba(255,255,255,0.07);
    --card: rgba(255,255,255,0.03);
    --glow: 0 0 60px rgba(232,255,71,0.12);
    --radius: 16px;
    --font-display: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.6;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999; opacity: 0.6;
  }

  .cursor { width:12px;height:12px;background:var(--accent);border-radius:50%;position:fixed;pointer-events:none;z-index:99999;transition:transform 0.15s ease,width 0.2s,height 0.2s;mix-blend-mode:difference; }
  .cursor-ring { width:36px;height:36px;border:1.5px solid rgba(232,255,71,0.4);border-radius:50%;position:fixed;pointer-events:none;z-index:99998;transition:all 0.08s linear;transform:translate(-50%,-50%); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }

  nav {
    position:fixed;top:0;left:0;right:0;z-index:1000;
    padding:20px 60px;
    display:flex;align-items:center;justify-content:space-between;
    backdrop-filter:blur(20px) saturate(1.5);
    background:rgba(10,10,15,0.7);
    border-bottom:1px solid var(--border);
    transition:padding 0.3s ease;
  }
  nav.scrolled { padding: 14px 60px; }
  .nav-logo { font-family:var(--font-display);font-size:1.4rem;font-weight:800;color:var(--text);text-decoration:none;letter-spacing:-0.03em; }
  .nav-logo span { color: var(--accent); }
  .nav-links { display:flex;gap:36px;list-style:none; }
  .nav-links a { color:var(--muted);text-decoration:none;font-size:0.85rem;font-weight:500;letter-spacing:0.04em;text-transform:uppercase;transition:color 0.2s;position:relative; }
  .nav-links a::after { content:'';position:absolute;bottom:-4px;left:0;width:0;height:1.5px;background:var(--accent);transition:width 0.25s ease; }
  .nav-links a:hover { color: var(--text); }
  .nav-links a:hover::after { width: 100%; }
  .nav-actions { display: flex; gap: 12px; }
  .btn { display:inline-flex;align-items:center;gap:8px;padding:10px 22px;border-radius:100px;font-family:var(--font-body);font-size:0.85rem;font-weight:500;cursor:pointer;transition:all 0.22s ease;border:none;text-decoration:none; }
  .btn-outline { background:transparent;border:1px solid var(--border);color:var(--text); }
  .btn-outline:hover { border-color:var(--accent);color:var(--accent); }
  .btn-accent { background:var(--accent);color:#0a0a0f;font-weight:700; }
  .btn-accent:hover { background:#f5ff6e;transform:translateY(-1px);box-shadow:0 8px 30px rgba(232,255,71,0.25); }

  #hero { min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:120px 60px 80px;position:relative;overflow:hidden; }
  .hero-grid-bg { position:absolute;inset:0;background-image:linear-gradient(rgba(232,255,71,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(232,255,71,0.03) 1px,transparent 1px);background-size:80px 80px;mask-image:radial-gradient(ellipse 80% 70% at 50% 50%,black,transparent); }
  .hero-glow { position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(232,255,71,0.06) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-60%);pointer-events:none; }
  .hero-tag { display:inline-flex;align-items:center;gap:8px;background:rgba(232,255,71,0.08);border:1px solid rgba(232,255,71,0.2);color:var(--accent);padding:6px 16px;border-radius:100px;font-size:0.78rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;width:fit-content;margin-bottom:28px;animation:fadeSlideUp 0.6s ease both; }
  .hero-tag::before { content:'';width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.4)} }
  .hero-title { font-family:var(--font-display);font-size:clamp(3.2rem,7vw,7rem);font-weight:800;line-height:1.0;letter-spacing:-0.04em;margin-bottom:28px;max-width:900px;animation:fadeSlideUp 0.7s 0.1s ease both; }
  .hero-title .line2 { color:var(--accent);display:block; }
  .hero-title .line3 { color:var(--muted);display:block;font-weight:400;font-style:italic; }
  .hero-sub { max-width:520px;color:var(--muted);font-size:1.05rem;line-height:1.7;margin-bottom:44px;animation:fadeSlideUp 0.7s 0.2s ease both; }
  .hero-actions { display:flex;gap:14px;flex-wrap:wrap;animation:fadeSlideUp 0.7s 0.3s ease both; }
  .btn-lg { padding: 15px 34px; font-size: 0.95rem; }
  .hero-stats { position:absolute;right:60px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:32px;animation:fadeSlideUp 0.8s 0.4s ease both; }
  .stat-item { text-align: right; }
  .stat-num { font-family:var(--font-display);font-size:2.8rem;font-weight:800;color:var(--text);line-height:1;display:block; }
  .stat-label { font-size:0.75rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted); }
  .stat-accent { color: var(--accent); }
  .scroll-hint { position:absolute;bottom:36px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted);animation:fadeSlideUp 1s 0.8s ease both; }
  .scroll-line { width:1px;height:48px;background:linear-gradient(to bottom,var(--accent),transparent);animation:scrollLine 2s infinite; }
  @keyframes scrollLine { 0%{transform:scaleY(0);transform-origin:top}50%{transform:scaleY(1);transform-origin:top}51%{transform:scaleY(1);transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom} }

  #about { padding:120px 60px;display:grid;grid-template-columns:1fr 1fr;gap:100px;align-items:center;position:relative; }
  .about-img-wrap { position: relative; }
  .about-img-frame { width:100%;aspect-ratio:4/5;background:var(--bg3);border-radius:24px;border:1px solid var(--border);overflow:hidden;position:relative; }
  .about-img-placeholder { width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted);font-size:0.85rem; }
  .about-img-placeholder svg { width:48px;height:48px;opacity:0.3; }
  .about-img-frame::before { content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(232,255,71,0.05),transparent 60%); }
  .about-corner { position:absolute;bottom:-24px;right:-24px;width:140px;padding:20px;background:var(--accent);border-radius:16px;color:#0a0a0f; }
  .about-corner .num { font-family:var(--font-display);font-size:2.4rem;font-weight:800;line-height:1;display:block; }
  .about-corner .lbl { font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em; }
  .section-tag { font-size:0.75rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--accent);font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:10px; }
  .section-tag::before { content:'';flex-shrink:0;width:28px;height:1.5px;background:var(--accent); }
  .section-title { font-family:var(--font-display);font-size:clamp(2rem,3.5vw,3.2rem);font-weight:800;line-height:1.1;letter-spacing:-0.03em;margin-bottom:22px; }
  .about-bio { color:var(--muted);line-height:1.8;margin-bottom:36px; }
  .about-bio p { margin-bottom: 14px; }
  .skills-list { display:flex;flex-wrap:wrap;gap:8px;margin-bottom:36px; }
  .skill-tag { padding:6px 14px;background:var(--card);border:1px solid var(--border);border-radius:100px;font-size:0.8rem;color:var(--text);transition:all 0.2s; }
  .skill-tag:hover { border-color:var(--accent);color:var(--accent);background:rgba(232,255,71,0.05); }

  #services { padding:120px 60px;background:var(--bg2);border-top:1px solid var(--border);border-bottom:1px solid var(--border); }
  .section-header { display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:60px; }
  .services-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:20px; }
  .service-card { background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:36px;position:relative;overflow:hidden;transition:all 0.3s ease;cursor:default; }
  .service-card::before { content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(232,255,71,0.04),transparent);opacity:0;transition:opacity 0.3s; }
  .service-card:hover { border-color:rgba(232,255,71,0.3);transform:translateY(-4px);box-shadow:var(--glow); }
  .service-card:hover::before { opacity: 1; }
  .service-icon { width:52px;height:52px;background:rgba(232,255,71,0.08);border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:22px;font-size:1.5rem; }
  .service-num { position:absolute;top:28px;right:28px;font-family:var(--font-display);font-size:3.5rem;font-weight:800;color:rgba(255,255,255,0.03);line-height:1; }
  .service-name { font-family:var(--font-display);font-size:1.2rem;font-weight:700;margin-bottom:12px; }
  .service-desc { color:var(--muted);font-size:0.9rem;line-height:1.7; }

  #portfolio { padding: 120px 60px; }
  .portfolio-filter { display:flex;gap:8px;margin-bottom:44px;flex-wrap:wrap; }
  .filter-btn { padding:8px 18px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--font-body);font-size:0.82rem;cursor:pointer;transition:all 0.2s; }
  .filter-btn.active,.filter-btn:hover { background:var(--accent);color:#0a0a0f;border-color:var(--accent);font-weight:700; }
  .portfolio-grid { display:grid;grid-template-columns:repeat(12,1fr);grid-template-rows:auto;gap:20px; }
  .project-card { background:var(--bg3);border:1px solid var(--border);border-radius:20px;overflow:hidden;position:relative;transition:all 0.4s ease;cursor:pointer; }
  .project-card:hover { transform:translateY(-6px);border-color:rgba(232,255,71,0.25);box-shadow:var(--glow); }
  .project-card:nth-child(1){grid-column:span 7}.project-card:nth-child(2){grid-column:span 5}.project-card:nth-child(3){grid-column:span 4}.project-card:nth-child(4){grid-column:span 8}.project-card:nth-child(5){grid-column:span 6}.project-card:nth-child(6){grid-column:span 6}
  .project-thumb { aspect-ratio:16/9;background:var(--bg2);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden; }
  .project-thumb-placeholder { width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);font-size:0.8rem; }
  .project-thumb-placeholder svg { width:36px;height:36px;opacity:0.2; }
  .project-overlay { position:absolute;inset:0;background:rgba(10,10,15,0.85);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.3s; }
  .project-card:hover .project-overlay { opacity: 1; }
  .view-btn { padding:10px 24px;background:var(--accent);color:#0a0a0f;border-radius:100px;font-weight:700;font-size:0.82rem;text-decoration:none;transform:translateY(8px);transition:transform 0.3s;display:inline-block; }
  .project-card:hover .view-btn { transform: translateY(0); }
  .project-info { padding: 22px 24px; }
  .project-cats { display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap; }
  .project-cat { padding:3px 10px;background:rgba(232,255,71,0.07);border:1px solid rgba(232,255,71,0.15);border-radius:100px;font-size:0.7rem;color:var(--accent);text-transform:uppercase;letter-spacing:0.07em; }
  .project-name { font-family:var(--font-display);font-size:1.1rem;font-weight:700;margin-bottom:6px; }
  .project-brief { color:var(--muted);font-size:0.85rem; }

  #experience { padding:120px 60px;background:var(--bg2);border-top:1px solid var(--border);border-bottom:1px solid var(--border); }
  .timeline { position:relative;padding-left:40px;max-width:800px; }
  .timeline::before { content:'';position:absolute;left:0;top:8px;bottom:0;width:1px;background:linear-gradient(to bottom,var(--accent),transparent); }
  .timeline-item { position:relative;margin-bottom:52px;padding-left:32px;opacity:0;transform:translateX(-20px);transition:all 0.5s ease; }
  .timeline-item.visible { opacity:1;transform:translateX(0); }
  .timeline-dot { position:absolute;left:-44px;top:6px;width:10px;height:10px;background:var(--accent);border-radius:50%;box-shadow:0 0 0 4px rgba(232,255,71,0.15); }
  .timeline-period { font-size:0.75rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--accent);font-weight:600;margin-bottom:8px; }
  .timeline-role { font-family:var(--font-display);font-size:1.25rem;font-weight:700;margin-bottom:4px; }
  .timeline-company { color:var(--muted);font-size:0.9rem;margin-bottom:12px; }
  .timeline-desc { color:var(--muted);font-size:0.9rem;line-height:1.7; }

  #testimonials { padding: 120px 60px; }
  .testimonials-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:20px; }
  .testimonial-card { background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:32px;transition:all 0.3s; }
  .testimonial-card:hover { border-color:rgba(232,255,71,0.2);transform:translateY(-3px); }
  .t-quote { font-size:2.5rem;color:var(--accent);line-height:1;margin-bottom:14px;font-family:Georgia,serif; }
  .t-text { color:var(--muted);font-size:0.92rem;line-height:1.8;margin-bottom:24px;font-style:italic; }
  .t-author { display:flex;align-items:center;gap:12px; }
  .t-avatar { width:42px;height:42px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;color:var(--accent);font-family:var(--font-display); }
  .t-name { font-weight:600;font-size:0.9rem; }
  .t-title { color:var(--muted);font-size:0.78rem; }
  .t-stars { color:var(--accent);font-size:0.85rem;margin-bottom:2px; }

  #contact { padding:120px 60px;background:var(--bg2);border-top:1px solid var(--border); }
  .contact-wrap { display:grid;grid-template-columns:1fr 1.3fr;gap:80px;align-items:start; }
  .contact-info-list { margin-top:36px;display:flex;flex-direction:column;gap:20px; }
  .contact-info-item { display:flex;align-items:center;gap:16px;padding:18px 22px;background:var(--card);border:1px solid var(--border);border-radius:12px;transition:all 0.2s; }
  .contact-info-item:hover { border-color: rgba(232,255,71,0.2); }
  .ci-icon { width:40px;height:40px;flex-shrink:0;background:rgba(232,255,71,0.08);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem; }
  .ci-label { font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted); }
  .ci-val { font-weight:500;font-size:0.9rem; }
  .contact-form { display:flex;flex-direction:column;gap:16px; }
  .form-row { display:grid;grid-template-columns:1fr 1fr;gap:16px; }
  .form-group { display:flex;flex-direction:column;gap:7px; }
  .form-group label { font-size:0.78rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);font-weight:500; }
  .form-control { padding:13px 18px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font-body);font-size:0.9rem;transition:all 0.2s;outline:none;resize:vertical; }
  .form-control:focus { border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,255,71,0.08);background:rgba(232,255,71,0.02); }
  .form-control::placeholder { color: rgba(112,112,160,0.5); }
  textarea.form-control { min-height: 130px; }
  .form-success { display:none;padding:14px 18px;background:rgba(232,255,71,0.08);border:1px solid rgba(232,255,71,0.3);border-radius:10px;color:var(--accent);font-size:0.88rem;text-align:center; }

  footer { padding:48px 60px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between; }
  .footer-logo { font-family:var(--font-display);font-size:1.1rem;font-weight:800;color:var(--text);text-decoration:none; }
  .footer-logo span { color: var(--accent); }
  .footer-copy { color:var(--muted);font-size:0.82rem; }
  .social-links { display:flex;gap:12px; }
  .social-link { width:38px;height:38px;background:var(--card);border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;color:var(--muted);font-size:0.85rem;transition:all 0.2s; }
  .social-link:hover { border-color:var(--accent);color:var(--accent);transform:translateY(-2px); }

  .modal-overlay { position:fixed;inset:0;background:rgba(10,10,15,0.92);backdrop-filter:blur(12px);z-index:2000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s ease; }
  .modal-overlay.open { opacity:1;pointer-events:all; }
  .modal { background:var(--bg3);border:1px solid var(--border);border-radius:24px;padding:48px 44px;width:100%;max-width:460px;position:relative;transform:translateY(20px) scale(0.96);transition:transform 0.3s ease;box-shadow:0 40px 100px rgba(0,0,0,0.5); }
  .modal-overlay.open .modal { transform:translateY(0) scale(1); }
  .modal-close { position:absolute;top:18px;right:20px;width:32px;height:32px;background:var(--card);border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;color:var(--muted);transition:all 0.2s;line-height:1; }
  .modal-close:hover { border-color:var(--accent);color:var(--accent); }
  .modal-logo { text-align:center;margin-bottom:8px;font-family:var(--font-display);font-size:1.4rem;font-weight:800;color:var(--text); }
  .modal-logo span { color: var(--accent); }
  .modal-subtitle { text-align:center;color:var(--muted);font-size:0.88rem;margin-bottom:32px; }
  .modal-tabs { display:flex;gap:0;margin-bottom:28px;background:var(--card);border:1px solid var(--border);border-radius:100px;padding:4px; }
  .modal-tab { flex:1;padding:9px;text-align:center;font-size:0.85rem;font-weight:600;cursor:pointer;border-radius:100px;transition:all 0.25s;color:var(--muted);font-family:var(--font-body);border:none;background:transparent; }
  .modal-tab.active { background:var(--accent);color:#0a0a0f; }
  .modal-form { display:flex;flex-direction:column;gap:14px; }
  .modal-form .form-group label { font-size:0.76rem;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted); }
  .input-wrap { position: relative; }
  .input-icon { position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:0.9rem;color:var(--muted);pointer-events:none; }
  .input-wrap .form-control { padding-left: 40px; }
  .modal-divider { display:flex;align-items:center;gap:14px;color:var(--muted);font-size:0.78rem;margin:4px 0; }
  .modal-divider::before,.modal-divider::after { content:'';flex:1;height:1px;background:var(--border); }
  .btn-social { padding:11px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--font-body);font-size:0.85rem;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:all 0.2s;width:100%; }
